spring.application.name=ai-service
server.port=8084

# PostgreSQL AI database
spring.datasource.url=jdbc:postgresql://localhost:5436/ai_db
spring.datasource.username=savia
spring.datasource.password=savia
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Kafka
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=ai-service-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.savia.ai_service.event.SavCaseCreatedEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# Actuator
management.endpoints.web.exposure.include=health,info

# Spring AI - Ollama
spring.ai.model.chat=ollama
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=llama3.1:latest
spring.ai.ollama.chat.options.temperature=0.2