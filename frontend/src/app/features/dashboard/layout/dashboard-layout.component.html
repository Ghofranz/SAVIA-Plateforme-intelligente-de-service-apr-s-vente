<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav mode="side" opened class="sidenav">
    <div class="sidenav-header">
      <mat-icon class="logo-icon">support_agent</mat-icon>
      <div class="logo-text">
        <span class="logo-title">SAVIA</span>
        <span class="logo-subtitle">Service Après-Vente</span>
      </div>
    </div>

    <mat-divider></mat-divider>

    <div class="user-info">
      <div class="avatar">{{ currentUser?.firstname?.[0] }}{{ currentUser?.lastname?.[0] }}</div>
      <div class="user-details">
        <span class="user-name">{{ currentUser?.firstname }} {{ currentUser?.lastname }}</span>
        <span class="user-role">{{ getRoleLabel(currentUser?.role || '') }}</span>
      </div>
    </div>

    <mat-divider></mat-divider>

    <mat-nav-list class="nav-list">
      @for (item of filteredNavItems; track item.route) {
        <a mat-list-item [routerLink]="item.route" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: item.exact }">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>

    <div class="sidenav-footer">
      <button class="logout-btn" (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Déconnexion</span>
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <mat-toolbar class="toolbar">
      <button mat-icon-button (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="spacer"></span>
      <button mat-icon-button [matMenuTriggerFor]="userMenu">
        <mat-icon>account_circle</mat-icon>
      </button>
      <mat-menu #userMenu>
        <button mat-menu-item routerLink="/dashboard/profile">
          <mat-icon>person</mat-icon>
          <span>Mon profil</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Déconnexion</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
